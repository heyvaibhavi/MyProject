<html>
<head>
    <title>Register - VSS</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            height: 100vh;
            background: linear-gradient(to right, #ff416c, #ff4b2b);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box {
            width: 320px;
            padding: 30px;
            background: white;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0px 5px 20px rgba(0,0,0,0.3);
        }

        h2 {
            color: #ff4b2b;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
            outline: none;
        }

        input:focus {
            border-color: #ff4b2b;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #ff4b2b;
            color: white;
            border: none;
            border-radius: 6px;
            margin-top: 10px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #e63e1f;
        }

        a {
            display: block;
            margin-top: 15px;
            text-decoration: none;
            color: #ff4b2b;
            font-size: 14px;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>Admin Register</h2>

    <form action="RegisterServlet" method="post">
        <input type="text" name="username" placeholder="Enter Username" required>
        <input type="password" name="password" placeholder="Enter Password" required>

        <button type="submit">Register</button>
    </form>

    <a href="login.html">Already have account? Login</a>
</div>

</body>
</html>
